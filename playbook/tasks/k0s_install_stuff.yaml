- name: Update repositories cache and upgrade package
  ansible.builtin.apt:
    upgrade: true
    update_cache: true

- name: Installed some stuff 1
  ansible.builtin.apt:
    name:
      - wget
      - tar
      - systemd-resolved
      - procps
      - kubectl
      - gpg
      - curl
      - apt-transport-https
      - python3-kubernetes
      - python3-firewall
      - firewalld
      - netplan.io
    state: present

- name: Check if /usr/local/bin/helm exists
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  changed_when: false
  register: helm_bin

- name: Install Helm
  ansible.builtin.shell: |
    wget https://get.helm.sh/helm-v4.1.3-linux-{{ arch }}.tar.gz
    tar -zxvf helm-v4.1.3-linux-{{ arch }}.tar.gz
    mv linux-{{ arch }}/helm /usr/local/bin/helm
  args:
    executable: /bin/bash
  when: not helm_bin.stat.exists
